name: video_spliter
description: "Videolarını böl, dilimle ve galerine kaydet."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI / tipografi
  google_fonts: ^6.2.1

  # Video oynatma & düzenleme (FFmpeg YOK -> native, hafif, güncel)
  video_player: ^2.9.2
  easy_video_editor: ^0.1.6

  # Cihazdan video seçme
  image_picker: ^1.1.2

  # Galeriye kaydetme (iOS + Android)
  gal: ^2.3.0

  # Doğrudan video URL'sinden indirme (genel amaçlı, YouTube/Instagram DEĞİL)
  dio: ^5.7.0

  # Yardımcılar
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  share_plus: ^12.0.0
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"